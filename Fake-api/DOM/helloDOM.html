<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    
</head>
<body>
    <h1 id="Titulo">Bem Vindo</h1>
    <p>Hello DOM JS</p>
    <button onclick="saudacao()"> Click em mim</button><br>
    <button ondblclick="mouseClicadoDuasVezes()"> Click 2 vezes</button><br>
    <button onmousedown="saudacao()"> Click em mim</button><br>
    <button onmouseup="saudacao()"> Click em mim</button><br>
    <button onmouseover="saudacaoLegal()"> Passe o Mouse</button><br>

    <script>
        alert(`Titulo: ${documento.getElementById("titulo").textContent}`);


        //JavaScript é uma linguagem Case Sensitive
        //por convenção, utilizamos o padrão Camel Case --Maiusculo a partir da segundda palavra
        function saudacao(){
         alert("Hello World!");
        }

        function saudacaoLegal(){
         alert("Olá amigo!");
        }

        function mouseClicadoDuasVezes(){
         alert("Mouse Clicado 2 vezes!");
        }

    </script>
</body>
</html>
