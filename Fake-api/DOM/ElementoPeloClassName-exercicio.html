<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .corsim {
            color: blue;
        }

        .cornao {
            color: red;
        }

        select option.corsim {
            color: blue;
        }

        select option.cornao {
            color: red;
        }
    </style>


</head>

<body>
    <input type="text" id="fruta" placeholder="digite o nome da fruta">
    <select name="" id="nomeClasse">
        <option value="">Selecione</option>
        <option value="corsim" class="corsim">CorSim</option>
        <option value="cornao" class="cornao">CorNao</option>
    </select>

    <button onclick="cadastrarFruta()"> Cadastrar</button>
    <h1>Frutas</h1>
    <ul id="listarFrutas">
        <li class="corsim">Amora</li>
    </ul>


    <script>
        function cadastrarFruta() {
            //retorna o valor do elemento

            const fruta = document.getElementById("fruta").value;
            const nomeClasse = document.getElementById("nomeClasse").value;
            const listarFrutas = document.getElementById("listarFrutas");



            //validação se preencheu todos os campos
            if (fruta.trim().length == 0 || nomeClasse.length == 0) {
                alert("Preencha todos os campos: fruta e nome da classe");
                return false
            }

            //mantendo os itens anteriores
            listarFrutas.innerHTML += `<li class="${nomeClasse}">${fruta}</li>`;
        }
    </script>
</body>

</html>
